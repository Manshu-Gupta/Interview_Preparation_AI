<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Interview Agent</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
<h1> AI Interview Agent</h1>
<p>Powered by Groq + Cognee</p>

<textarea id="resume" placeholder="Paste your resume here..."></textarea>
<button onclick="startInterview()">🚀 Start Interview</button>

<div id="questionBox">Press 'Get Question' to begin.</div>

<textarea id="answer" placeholder="Write your answer here..."></textarea>

<div class="row">
<button onclick="getQuestion()">❓ Get Question</button>
<button onclick="submitAnswer()">✅ Submit Answer</button>
</div>

<pre id="output"></pre>
</div>

<script src="script.js"></script>
</body>
</html>
